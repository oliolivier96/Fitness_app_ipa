workflows:
  ios-workflow:
    name: iOS Capacitor Build

    environment:
      xcode: latest
      node: latest

scripts:
  - name: Install dependencies
    script: |
      npm install

  - name: Build web app
    script: |
      npm run build:web

  - name: Sync Capacitor
    script: |
      npm run cap:sync

  - name: Install CocoaPods
    script: |
      cd ios/App
      pod install
      cd ../..

  - name: Build IPA
    script: |
      xcode-project build-ipa \
        --workspace "ios/App/App.xcworkspace" \
        --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa